# =============================================================
# wrangler.toml - VEKT meet
# =============================================================
name = "vekt-meet-api"
main = "worker.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Worker handles /api/* on the Pages domain.
[[routes]]
pattern = "meet.vekt.ro/api/*"
zone_name = "vekt.ro"

# -------------------------------------------------------------
# Public vars
# -------------------------------------------------------------
[vars]
SUPABASE_URL       = "https://pwmoksolnvlqonxswisr.supabase.co"
RESEND_FROM        = "VEKT meet <noreply@meet.vekt.ro>"
RESEND_REPLY_TO    = "contact@vekt.ro"
PUBLIC_SITE_URL    = "https://meet.vekt.ro"
UNSUBSCRIBE_URL    = "https://meet.vekt.ro/unsubscribe.html"
ALLOWED_ORIGIN     = "https://meet.vekt.ro"
RATE_LIMIT_PER_HR  = "5"

# -------------------------------------------------------------
# Secrets (set with: wrangler secret put <NAME>)
#   SUPABASE_SERVICE_KEY  - service_role JWT from Supabase Settings > API
#   RESEND_API_KEY        - Resend API key
#   CSRF_SECRET           - 32+ byte hex
# -------------------------------------------------------------

# -------------------------------------------------------------
# Scheduled cleanup of rate_limits (hourly)
# -------------------------------------------------------------
[triggers]
crons = ["0 * * * *"]
